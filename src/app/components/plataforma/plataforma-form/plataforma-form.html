<section class="page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/adm/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <a class="bc-link" routerLink="/adm/plataformas">Plataformas</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">{{ form.value.id ? 'Editar Plataforma' : 'Nova Plataforma' }}</span>
  </nav>

  <div class="form-hero-row">
    <div>
      <h1 class="page-title">Cadastro de Plataforma</h1>
      <p class="page-subtitle">Defina onde os jogos podem ser encontrados e vendidos.</p>
    </div>
    <button class="voltar-btn" type="button" routerLink="/adm/plataformas">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
  </div>

  <form class="form-layout" [formGroup]="form">
    <div class="form-section-card">
      <div class="section-header">
        <mat-icon class="section-icon">memory</mat-icon>
        <h3 class="section-title">Dados da plataforma</h3>
      </div>

      <div class="section-grid">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" placeholder="Ex.: PC, PlayStation 5, Xbox Series" />
        </mat-form-field>
      </div>
    </div>

    <div class="form-footer">
      <button matButton="text" type="button" routerLink="/adm/plataformas">Cancelar</button>
      <button matButton="outlined" type="button" (click)="excluir()" [disabled]="!form.value.id">
        <mat-icon>delete</mat-icon>
        Excluir
      </button>
      <button matButton="filled" type="button" (click)="salvar()">
        <mat-icon>save</mat-icon>
        Salvar
      </button>
    </div>
  </form>
</section>
