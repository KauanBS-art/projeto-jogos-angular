<section class="page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/adm/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <a class="bc-link" routerLink="/adm/usuarios">Usuarios</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">{{ form.value.id ? 'Editar Usuario' : 'Novo Usuario' }}</span>
  </nav>

  <div class="form-hero-row">
    <div>
      <h1 class="page-title">Cadastro de Usuario</h1>
      <p class="page-subtitle">Configure os perfis de acesso para o painel administrativo.</p>
    </div>
    <button class="voltar-btn" type="button" routerLink="/adm/usuarios">
      <mat-icon>arrow_back</mat-icon>
      Voltar
    </button>
  </div>

  <form class="form-layout" [formGroup]="form">
    <div class="form-section-card">
      <div class="section-header">
        <mat-icon class="section-icon">group</mat-icon>
        <h3 class="section-title">Dados do usuario</h3>
      </div>

      <div class="section-grid">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="nome" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="senha" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Perfil</mat-label>
          <mat-select formControlName="idPerfil">
            @for (perfil of perfis; track perfil.id) {
              <mat-option [value]="perfil.id">{{ perfil.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <div class="form-footer">
      <button matButton="text" type="button" routerLink="/adm/usuarios">Cancelar</button>
      <button matButton="outlined" type="button" (click)="excluir()" [disabled]="!form.value.id">
        <mat-icon>delete</mat-icon>
        Excluir
      </button>
      <button matButton="filled" type="button" (click)="salvar()">
        <mat-icon>save</mat-icon>
        Salvar
      </button>
    </div>
  </form>
</section>
