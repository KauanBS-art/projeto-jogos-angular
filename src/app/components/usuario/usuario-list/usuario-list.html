<section class="page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/adm/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">Usuarios</span>
  </nav>

  <div class="page-header">
    <div>
      <h1 class="page-title">Controle de Usuarios</h1>
      <p class="page-subtitle">Gerencie acessos administrativos e operacionais do marketplace.</p>
    </div>
    <button matButton="filled" routerLink="/adm/usuarios/new">
      <mat-icon>add</mat-icon>
      Novo Usuario
    </button>
  </div>

  <div class="filter-bar">
    <div class="filter-search">
      <mat-icon>search</mat-icon>
      <input (keyup)="aplicarBusca($event)" placeholder="Buscar usuario por nome..." />
    </div>
  </div>

  <div class="list-card">
    <table mat-table [dataSource]="items">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let item; let i = index">{{ i + 1 + page * pageSize }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let item">{{ item.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let item">{{ item.email }}</td>
      </ng-container>

      <ng-container matColumnDef="perfil">
        <th mat-header-cell *matHeaderCellDef>Perfil</th>
        <td mat-cell *matCellDef="let item">{{ obterPerfil(item) }}</td>
      </ng-container>

      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef>Acoes</th>
        <td mat-cell *matCellDef="let item">
          <div class="table-actions">
            <button class="action-edit" [routerLink]="['/adm/usuarios/edit', item.id]"><mat-icon>edit</mat-icon></button>
            <button class="action-delete" type="button" (click)="excluir(item)"><mat-icon>delete</mat-icon></button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalRecords" [pageSize]="pageSize" [pageSizeOptions]="[4, 8, 16]" (page)="paginar($event)"></mat-paginator>
  </div>
</section>
