<section class="page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a class="bc-link" routerLink="/adm/dashboard">Home</a>
    <mat-icon class="bc-sep">chevron_right</mat-icon>
    <span class="bc-current">Categorias</span>
  </nav>

  <div class="page-header">
    <div>
      <h1 class="page-title">Controle de Categorias</h1>
      <p class="page-subtitle">Organize o catalogo de jogos por genero e classificacao.</p>
    </div>
    <button matButton="filled" routerLink="/adm/categorias/new">
      <mat-icon>add</mat-icon>
      Nova Categoria
    </button>
  </div>

  <div class="filter-bar">
    <div class="filter-search">
      <mat-icon>search</mat-icon>
      <input (keyup)="aplicarBusca($event)" placeholder="Buscar categoria por nome..." />
    </div>
  </div>

  <div class="list-card">
    <table mat-table [dataSource]="items">
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let item; let i = index">{{ i + 1 + page * pageSize }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let item">{{ item.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="totalJogos">
        <th mat-header-cell *matHeaderCellDef>Total de jogos</th>
        <td mat-cell *matCellDef="let item">{{ item.totalJogos }}</td>
      </ng-container>

      <ng-container matColumnDef="acao">
        <th mat-header-cell *matHeaderCellDef>Acoes</th>
        <td mat-cell *matCellDef="let item">
          <div class="table-actions">
            <button class="action-edit" [routerLink]="['/adm/categorias/edit', item.id]">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="action-delete" type="button" (click)="excluir(item)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalRecords" [pageSize]="pageSize" [pageSizeOptions]="[4, 8, 16]" (page)="paginar($event)"></mat-paginator>
  </div>
</section>
