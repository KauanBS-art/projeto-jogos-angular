<section class="auth-card">
  <span class="eyebrow"><mat-icon>person_add</mat-icon> Nova conta</span>
  <h1>Crie seu cadastro</h1>
  <p>Use sua conta para salvar lista de desejos, enderecos e acompanhar compras.</p>

  <form [formGroup]="form">
    <mat-form-field appearance="outline">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>CPF</mat-label>
        <input matInput formControlName="cpf" />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Senha</mat-label>
      <input matInput type="password" formControlName="senha" />
    </mat-form-field>

    <button matButton="filled" type="button" (click)="cadastrar()" [disabled]="enviando">
      <mat-icon>check</mat-icon>
      {{ enviando ? 'Criando...' : 'Criar conta' }}
    </button>
  </form>

  <a routerLink="/login">Ja tenho conta</a>
</section>
