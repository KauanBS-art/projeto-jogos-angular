<mat-toolbar class="adm-header">
  <div class="brand-copy">
    <strong>GameXtore</strong>
    <small>Painel administrativo do marketplace</small>
  </div>

  <div class="adm-header-actions">
    <button
      mat-icon-button
      type="button"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkTheme() ? 'Ativar modo claro' : 'Ativar modo escuro'">
      <mat-icon>{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="user-badge" *ngIf="authService.currentUser() as usuario">
      <mat-icon>account_circle</mat-icon>
      <span>{{ usuario.nome }}</span>
    </div>

    <button mat-icon-button aria-label="Sair" (click)="authService.logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</mat-toolbar>
